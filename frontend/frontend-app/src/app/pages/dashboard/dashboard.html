<section class="dashboard-page">
  <app-sidebar></app-sidebar>

  <main class="main-content">
    <app-page-header
      title="Hola, Piero Montalvo 👋"
      subtitle="Resumen general de tus análisis">

      <button actions routerLink="/analyze">
        Analizar nuevo cacao
      </button>

    </app-page-header>

    <section class="stats">
      <app-stat-card
        title="Total análisis"
        value="152">
      </app-stat-card>

      <app-stat-card
        title="Cacao sano"
        value="78"
        subtitle="51.3%"
        color="green">
      </app-stat-card>

      <app-stat-card
        title="Con podredumbre"
        value="45"
        subtitle="29.6%"
        color="red">
      </app-stat-card>

      <app-stat-card
        title="Con parásitos"
        value="29"
        subtitle="19.1%"
        color="orange">
      </app-stat-card>
    </section>

    <section class="dashboard-grid">
      <app-chart-card title="Análisis por fecha">
        <div class="fake-chart">
          <div style="height: 45%"></div>
          <div style="height: 38%"></div>
          <div style="height: 55%"></div>
          <div style="height: 72%"></div>
          <div style="height: 48%"></div>
          <div style="height: 60%"></div>
          <div style="height: 82%"></div>
        </div>

        <div class="chart-dates">
          <span>10 May</span>
          <span>11 May</span>
          <span>12 May</span>
          <span>13 May</span>
          <span>14 May</span>
          <span>15 May</span>
          <span>16 May</span>
        </div>
      </app-chart-card>

      <app-chart-card title="Últimos análisis">
        <div class="recent-list">
          <app-analysis-item
            image="/assets/home/home-bg.png"
            title="Cacao_2024_05_16_01"
            result="Sano"
            date="16/05/2024 10:00 a.m."
            color="green">
          </app-analysis-item>

          <app-analysis-item
            image="/assets/home/home-bg.png"
            title="Cacao_2024_05_16_02"
            result="Con podredumbre"
            date="16/05/2024 09:45 a.m."
            color="red">
          </app-analysis-item>

          <app-analysis-item
            image="/assets/home/home-bg.png"
            title="Cacao_2024_05_16_03"
            result="Con parásitos"
            date="16/05/2024 08:15 a.m."
            color="orange">
          </app-analysis-item>
        </div>
      </app-chart-card>
    </section>
  </main>
</section>
