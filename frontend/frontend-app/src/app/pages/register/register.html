<section class="register-page">

  <div class="register-card">

    <!-- IZQUIERDA -->

    <div class="register-left">

      <img
        src="/assets/register/cacao-register.png"
        alt="Cacao"
        class="register-image"
      />

    </div>

    <!-- DERECHA -->

    <div class="register-right">

      <div class="form-box">

        <h1>Crear cuenta</h1>

        <p>
          Únete y comienza a analizar tus cacaos
        </p>

        <form>

          <div class="input-group">
            <input
              type="text"
              placeholder="Nombre completo"
            />
          </div>

          <div class="input-group">
            <input
              type="email"
              placeholder="Correo electrónico"
            />
          </div>

          <div class="input-group">
            <input
              type="text"
              placeholder="Nombre de usuario"
            />
          </div>

          <div class="input-group">
            <input
              type="password"
              placeholder="Contraseña"
            />
          </div>

          <div class="input-group">
            <input
              type="password"
              placeholder="Confirmar contraseña"
            />
          </div>

          <label class="terms">

            <input type="checkbox" />

            <span>
              Acepto los <a>Términos y condiciones</a>
            </span>

          </label>

          <button class="btn-register">
            Registrarse
          </button>

        </form>

        <div class="login-link">

          ¿Ya tienes cuenta?

          <a routerLink="/login">
            Iniciar sesión
          </a>

        </div>

      </div>

    </div>

  </div>

</section>
