<div class="result-card">
  <h2>Resultado</h2>

  <div class="result-content">
    <div class="result-icon" [class]="color">
      {{ icon }}
    </div>

    <div>
      <h3 [class]="color + '-text'">{{ result }}</h3>
      <p>{{ confidence }} de confianza</p>
    </div>
  </div>

  <div class="progress">
    <div [class]="color" [style.width]="confidence"></div>
  </div>
</div>
